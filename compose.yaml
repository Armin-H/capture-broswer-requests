services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/myapp
    env_file:
      - .env.sample
    command: uvicorn main:app --host "0.0.0.0" --port "8000" --reload 
  
  db_service:
    image: postgres:latest
    ports:
      - "5432:5432"
    env_file:
      - .env.sample