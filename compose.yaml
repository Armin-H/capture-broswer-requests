services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/myapp
    env_file:
      - .env.sample
    command: uvicorn main:app --host "0.0.0.0" --port "8000" --reload 
    depends_on:
      - db_service

  mitmproxy:
    image: mitmproxy/mitmproxy:12
    command:
      - mitmweb
      - -s
      - /addon/capture_addon.py
      - --listen-host
      - "0.0.0.0"
      - --listen-port
      - "8080"
      - --web-host
      - "0.0.0.0"
      - --web-port
      - "8081"
      # mitmweb UI password
      - --set
      - web_password=mitm
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./mitm/addon:/addon:ro
      # mitm CA + state;
      - mitm_home:/home/mitmproxy/.mitmproxy
    ports:
      - "8080:8080"
      - "8081:8081"

  db_service:
    image: postgres:latest
    ports:
      - "5432:5432"
    env_file:
      - .env.sample
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
  mitm_home: